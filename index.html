<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Conan — coming soon</title>
    <meta
      name="description"
      content="A terminal-primary native desktop app that wraps and observes Claude Code."
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #faf6e8;
        --fg: #1c1c1c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1c1c;
          --fg: #faf6e8;
        }
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas,
          monospace;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
      }
      h1 {
        font-size: clamp(2rem, 6vw, 4rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0;
        opacity: 0.7;
        max-width: 38rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>conan.sh</h1>
      <p>
        A terminal-primary native desktop app that wraps and observes Claude
        Code. Coming soon.
      </p>
    </main>
  </body>
</html>
